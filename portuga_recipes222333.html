<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתכונים מבית פורטוגה</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F9F4EC;--warm:#7B4F2E;--dark:#3E2410;--terra:#C0622F;--gold:#D4A44C;--txt:#2E1A0E;--muted:#8C7B6B;--bdr:rgba(123,79,46,0.15);--card:#FFFDF8;--inp:#FDF8F2}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--txt);direction:rtl;min-height:100vh}
.hdr{background:var(--dark);padding:1.6rem 2rem 1.3rem;text-align:center}
.hdr h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);letter-spacing:1px}
.hdr p{font-size:.82rem;color:rgba(212,164,76,.5);margin-top:.2rem;font-weight:300}
.hdr-div{width:55px;height:1px;background:var(--gold);margin:.75rem auto 0;opacity:.3}
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.7rem;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.bc{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:5px;flex-shrink:0}
.bcl{color:var(--warm);cursor:pointer;font-weight:500}.bcl:hover{text-decoration:underline}
.tr{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.sw{position:relative}
.sw input{padding:.38rem .75rem .38rem 1.9rem;border:1px solid var(--bdr);border-radius:20px;background:var(--inp);font-family:'Heebo',sans-serif;font-size:.8rem;color:var(--txt);outline:none;width:155px;direction:rtl;transition:border-color .2s,width .2s}
.sw input:focus{border-color:var(--gold);width:200px}
.si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted)}
.lb{padding:.38rem .85rem;border-radius:20px;border:1px solid var(--bdr);background:transparent;font-family:'Heebo',sans-serif;font-size:.78rem;color:var(--warm);cursor:pointer;white-space:nowrap;transition:all .2s}
.lb:hover{background:var(--warm);color:white;border-color:var(--warm)}
.uc{font-size:.78rem;color:var(--warm);white-space:nowrap}
.ab{padding:.38rem .95rem;border-radius:20px;border:none;background:var(--warm);color:var(--gold);font-family:'Heebo',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap}
.ab:hover{background:var(--dark)}
/* HOME */
.home{padding:1.6rem 1.4rem;max-width:880px;margin:0 auto}
.sh{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--muted);margin-bottom:1.1rem;text-align:center;letter-spacing:.4px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.95rem}
.cc{background:var(--card);border-radius:14px;border:1px solid var(--bdr);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;gap:0}
.cc-img{width:100%;height:140px;overflow:hidden;flex-shrink:0}
.cc-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cc:hover .cc-img img{transform:scale(1.05)}
.cn{padding:.7rem 1rem .2rem}
.ck{padding:0 1rem .85rem}
.cc:hover{transform:translateY(-3px);border-color:var(--gold)}
.ce{font-size:2.1rem;line-height:1;padding:1.1rem 1.2rem .2rem}
.cn{font-family:'Playfair Display',serif;font-size:1.08rem;color:var(--dark)}
.ck{font-size:.72rem;color:var(--muted)}
/* CATEGORY */
.catsec{padding:1.3rem 1.4rem;max-width:1050px;margin:0 auto}
.chd{display:flex;align-items:center;gap:.7rem;margin-bottom:.95rem}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:1.05rem}
.rc{background:var(--card);border-radius:12px;border:1px solid var(--bdr);overflow:hidden;cursor:pointer;transition:transform .2s}
.rc:hover{transform:translateY(-3px)}
.ri{width:100%;height:140px;background:#E8D5B7;display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden;position:relative}
.ri img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.rie{position:relative;z-index:1}
.rb{padding:.8rem .95rem .95rem}
.rt{font-family:'Playfair Display',serif;font-size:1.02rem;color:var(--dark);margin-bottom:.2rem}
.rm{font-size:.73rem;color:var(--muted);display:flex;justify-content:space-between;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--bdr)}
.es{text-align:center;padding:2.5rem;color:var(--muted);grid-column:1/-1}
/* DETAIL */
.dtsec{padding:1.3rem 1.4rem;max-width:690px;margin:0 auto}
.dhero{border-radius:12px;height:220px;background:#E8D5B7;display:flex;align-items:center;justify-content:center;font-size:4.8rem;margin-bottom:1.1rem;overflow:hidden;position:relative}
.dhero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.dhe{position:relative;z-index:1}
.dtit{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);margin-bottom:.28rem}
.dmt{font-size:.8rem;color:var(--muted);display:flex;gap:.9rem;flex-wrap:wrap;margin-bottom:1rem}
.dmt b{color:var(--warm)}
.sl{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--warm);margin-bottom:.42rem;padding-bottom:.25rem;border-bottom:1px solid var(--bdr);margin-top:1.05rem}
.il{list-style:none}
.il li{padding:.28rem 0;border-bottom:1px solid rgba(123,79,46,.06);font-size:.85rem;display:flex;gap:.45rem}
.il li::before{content:'•';color:var(--gold)}
.instxt{font-size:.87rem;line-height:1.85;color:var(--txt);white-space:pre-wrap}
.nbox{background:#FDF5E8;border:1px solid rgba(212,164,76,.22);border-radius:10px;padding:.85rem 1rem;font-size:.84rem;line-height:1.75;white-space:pre-wrap}
.ximgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:.65rem;margin-top:.45rem}
.ximgs img{width:100%;height:112px;object-fit:cover;border-radius:8px;border:1px solid var(--bdr)}
.pbtn{width:100%;padding:.65rem;border-radius:10px;border:1px solid var(--warm);background:transparent;color:var(--warm);font-family:'Heebo',sans-serif;font-size:.84rem;cursor:pointer;margin-top:1rem;transition:all .2s}
.pbtn:hover{background:var(--warm);color:white}
.dbtn{width:100%;padding:.65rem;border-radius:10px;border:1px solid #A32D2D;background:transparent;color:#A32D2D;font-family:'Heebo',sans-serif;font-size:.84rem;cursor:pointer;margin-top:.5rem;transition:all .2s}
.dbtn:hover{background:#A32D2D;color:white}
.srl{font-size:.76rem;color:var(--muted);margin-bottom:.55rem;padding-bottom:.38rem;border-bottom:1px solid var(--bdr)}
/* OVERLAY */
.ovr{display:none;position:fixed;inset:0;background:rgba(30,15,5,.52);z-index:50;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.ovr.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:450px;overflow:hidden;margin:auto}
.mhd{background:var(--dark);padding:1.05rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.mhtit{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem}
.mx{background:none;border:none;color:rgba(212,164,76,.6);font-size:1.25rem;cursor:pointer;line-height:1}
.mbody{padding:1.15rem 1.25rem}
.fg{margin-bottom:.78rem}
.fl{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.23rem;font-weight:500}
.fi,.fsel,.fta{width:100%;padding:.5rem .8rem;border:1px solid var(--bdr);border-radius:8px;background:var(--inp);font-family:'Heebo',sans-serif;font-size:.84rem;color:var(--txt);outline:none;direction:rtl;transition:border-color .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--gold)}
.fta{min-height:70px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.sbtn{width:100%;padding:.7rem;border-radius:10px;border:none;background:var(--warm);color:var(--gold);font-family:'Heebo',sans-serif;font-size:.87rem;font-weight:500;cursor:pointer;margin-top:.3rem}
.sbtn:hover{background:var(--dark)}
.errtxt{color:#A32D2D;font-size:.76rem;margin-top:.32rem;text-align:center}
.upl{border:2px dashed var(--bdr);border-radius:10px;padding:.88rem;text-align:center;cursor:pointer;font-size:.79rem;color:var(--muted);transition:border-color .2s;margin-top:.35rem}
.upl:hover{border-color:var(--gold)}
.prev{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.45rem}
.prev img{width:64px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--bdr)}
</style>
</head>
<body>

<div class="hdr">
  <h1>🍽️ מתכונים מבית פורטוגה</h1>
  <p>המתכונים הכי אהובים שלנו, במקום אחד</p>
  <div class="hdr-div"></div>
</div>

<div class="topbar">
  <div class="bc" id="bc"></div>
  <div class="tr">
    <div class="sw"><span class="si">🔍</span><input type="text" id="sq" placeholder="חיפוש מתכון..." oninput="onSearch()"></div>
    <div id="aa"></div>
  </div>
</div>

<div id="mc"></div>

<!-- Login -->
<div class="ovr" id="loginOvr">
  <div class="modal">
    <div class="mhd"><span class="mhtit">כניסה למשפחה</span><button class="mx" onclick="cOvr('loginOvr')">✕</button></div>
    <div class="mbody">
      <div class="fg"><label class="fl">שם משתמש</label><input class="fi" id="lu" placeholder="שם משתמש" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label class="fl">סיסמא</label><input class="fi" type="password" id="lp" placeholder="סיסמא" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="errtxt" id="lerr"></div>
      <button class="sbtn" onclick="doLogin()">כניסה</button>
    </div>
  </div>
</div>

<!-- Add Recipe -->
<div class="ovr" id="addOvr">
  <div class="modal" style="max-width:520px">
    <div class="mhd"><span class="mhtit">מתכון חדש</span><button class="mx" onclick="cOvr('addOvr');resetAddForm()">✕</button></div>
    <div class="mbody">
      <div class="fg">
        <label class="fl">תמונה ראשית</label>
        <div class="upl" onclick="document.getElementById('hu').click()">📷 לחץ להעלאת תמונה ראשית<input type="file" id="hu" accept="image/*" style="display:none" onchange="pvH(this)"></div>
        <div id="hp"></div>
      </div>
      <div class="fg"><label class="fl">שם המתכון</label><input class="fi" id="fT" placeholder="למשל: עוף בתנור של סבתא"></div>
      <div class="frow">
        <div class="fg"><label class="fl">קטגוריה</label>
          <select class="fsel" id="fC"><option>ראשונות</option><option>סלטים</option><option>עיקריות</option><option>מרקים</option><option>תוספות</option><option>קינוחים</option><option>מאכלי חגים</option></select>
        </div>
        <div class="fg"><label class="fl">זמן הכנה</label><input class="fi" id="fTm" placeholder="45 דקות"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">של מי?</label><input class="fi" id="fA" placeholder="סבתא רחל"></div>
        <div class="fg"><label class="fl">מנות</label><input class="fi" id="fSv" placeholder="6 מנות"></div>
      </div>
      <div class="fg"><label class="fl">מצרכים למתכון (שורה לכל מצרך)</label><textarea class="fta" id="fI" style="min-height:82px" placeholder="1 ק״ג עוף&#10;3 כפות שמן זית&#10;מלח ופלפל לפי הטעם"></textarea></div>
      <div class="fg"><label class="fl">הוראות הכנה</label><textarea class="fta" id="fSt" style="min-height:95px" placeholder="כותבים כאן בחופשיות, שלב אחרי שלב..."></textarea></div>
      <div class="fg"><label class="fl">הערות</label><textarea class="fta" id="fN" placeholder="טיפים, וריאציות, עצות מהניסיון..."></textarea></div>
      <div class="fg">
        <label class="fl">תמונות נוספות</label>
        <div class="upl" onclick="document.getElementById('eu').click()">📸 הוסף תמונות שלבים / תוצאה סופית<input type="file" id="eu" accept="image/*" multiple style="display:none" onchange="pvE(this)"></div>
        <div class="prev" id="ep"></div>
      </div>
      <input type="hidden" id="editId" value="">
      <button class="sbtn" id="eSaveBtn" style="display:none;background:#5a8a5a;" onclick="saveEdit()">💾 שמור שינויים</button>
      <button class="sbtn" id="saveBtn" onclick="saveR()">שמירת המתכון</button>
    </div>
  </div>
</div>

function loadRecipes(){
  try{
    const d=localStorage.getItem(STORE_KEY);
    if(d){
      const parsed=JSON.parse(d);

    saveRecipes(fresh);

function saveRecipes(arr){try{localStorage.setItem(STORE_KEY,JSON.stringify(arr));}catch(e){}}

function defaultRecipes(){return PDF_RECIPES.map(r=>({...r}));}

let recipes=loadRecipes();
let nextId=Math.max(...recipes.map(r=>r.id),9)+1;
let view='home',curCat=null,curId=null,loggedIn=false,curUser='',heroB64=null,extraB64=[],searchQ='';

function render(){
  renderAuth();renderBC();
  const q=searchQ.trim().toLowerCase();
  if(q){renderSearch(q);}
  else if(view==='home')renderHome();
  else if(view==='category')renderCat();
  else if(view==='recipe')renderDetail();
}

function renderAuth(){
  const el=document.getElementById('aa');
  if(loggedIn){
    el.innerHTML=`<span class="uc">👤 ${curUser}</span><button class="ab" onclick="openAdd()">+ מתכון חדש</button><button class="lb" onclick="exportData()">💾 ייצוא</button><button class="lb" onclick="document.getElementById('importInput').click()">📂 ייבוא</button><button class="lb" onclick="logout()">יציאה</button><input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(this)">`;
  } else {
    el.innerHTML=`<button class="lb" onclick="document.getElementById('loginOvr').classList.add('open')">כניסה לעריכה</button>`;
  }
}

function renderBC(){
  const bc=document.getElementById('bc');
  if(view==='home'||searchQ){bc.innerHTML=`<span style="color:var(--muted)">🏠 בית</span>`;return;}
  if(view==='category'){bc.innerHTML=`<span class="bcl" onclick="goHome()">🏠 בית</span><span>›</span><span style="color:var(--muted)">${curCat}</span>`;return;}
  const r=recipes.find(x=>x.id===curId);
  bc.innerHTML=`<span class="bcl" onclick="goHome()">🏠 בית</span><span>›</span><span class="bcl" onclick="goCat('${r?r.cat:''}')">${r?r.cat:''}</span><span>›</span><span style="color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r?r.title:''}</span>`;
}

function renderHome(){
  document.getElementById('mc').innerHTML=`<div class="home">
    <div class="sh">בחר קטגוריה</div>
    <div class="cg">${CATS.map(c=>{const cnt=recipes.filter(r=>r.cat===c.name).length;const img=CAT_IMGS[c.name];return`<div class="cc" onclick="goCat('${c.name}')">${img?`<div class="cc-img"><img src="${img}" alt="${c.name}"></div>`:`<span class="ce">${c.emoji}</span>`}<div class="cn">${c.name}</div><div class="ck">${cnt} מתכונים</div></div>`;}).join('')}</div>
  </div>`;
}

function renderSearch(q){
  const res=recipes.filter(r=>r.title.toLowerCase().includes(q)||r.author.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q));
  document.getElementById('mc').innerHTML=`<div class="catsec">
    <div class="srl">תוצאות עבור "<b>${q}</b>" — ${res.length} מתכונים</div>
    <div class="rg">${res.length?res.map(r=>rcCard(r)).join(''):'<div class="es">לא נמצאו מתכונים 🍽️</div>'}</div>
  </div>`;
}

function rcCard(r){
  return`<div class="rc" onclick="goRecipe(${r.id})">
    <div class="ri">${r.heroImg?`<img src="${r.heroImg}" alt="">`:''}
      <span class="rie" ${r.heroImg?'style="opacity:0"':''}>${r.emoji}</span></div>
    <div class="rb"><div class="rt">${r.title}</div>
      <div style="font-size:.74rem;color:var(--muted)">מאת <span style="color:var(--warm)">${r.author}</span></div>
      <div class="rm"><span>${r.servings}</span><span>⏱ ${r.time}</span></div>
    </div></div>`;
}

function renderCat(){
  const cat=CATS.find(c=>c.name===curCat);
  const list=recipes.filter(r=>r.cat===curCat);
  document.getElementById('mc').innerHTML=`<div class="catsec">
    <div class="chd"><span style="font-size:2rem">${cat?cat.emoji:''}</span>
      <div><div style="font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--dark)">${curCat}</div>
      <div style="font-size:.77rem;color:var(--muted)">${list.length} מתכונים</div></div></div>
    <div class="rg">${list.length?list.map(r=>rcCard(r)).join(''):'<div class="es">עדיין אין מתכונים בקטגוריה זו 🍽️</div>'}</div>
  </div>`;
}

function renderDetail(){
  const r=recipes.find(x=>x.id===curId);
  if(!r){goHome();return;}
  const extraHtml=r.extraImgs&&r.extraImgs.length?'<div class="sl">תמונות</div><div class="ximgs">'+r.extraImgs.map(s=>'<img src="'+s+'" alt="">').join('')+'</div>':'';
  const notesHtml=r.notes?'<div class="sl">הערות</div><div class="nbox">'+r.notes+'</div>':'';
  const btnHtml=loggedIn?'<button class="dbtn" style="border-color:#5a8a5a;color:#5a8a5a;" onclick="openEdit('+r.id+')">✏️ עריכת מתכון</button><button class="dbtn" onclick="deleteR('+r.id+')">🗑️ מחיקת מתכון</button>':'';
  document.getElementById('mc').innerHTML='<div class="dtsec">'
    +'<div class="dhero">'+(r.heroImg?'<img src="'+r.heroImg+'" alt="'+r.title+'">':'')
    +'<span class="dhe" '+(r.heroImg?'style="opacity:0"':'')+'>'+r.emoji+'</span></div>'
    +'<div class="dtit">'+r.title+'</div>'
    +'<div class="dmt"><span>מאת <b>'+r.author+'</b></span><span>⏱ '+r.time+'</span><span>👥 '+r.servings+'</span></div>'
    +'<div class="sl">מצרכים למתכון</div>'
    +'<ul class="il">'+r.ing.map(i=>'<li>'+i+'</li>').join('')+'</ul>'
    +'<div class="sl">הוראות הכנה</div>'
    +'<div class="instxt">'+r.steps+'</div>'
    +notesHtml+extraHtml
    +'<button class="pbtn" onclick="printR('+r.id+')">🖨️ הדפסה / שיתוף</button>'
    +btnHtml
    +'</div>';
}

function onSearch(){searchQ=document.getElementById('sq').value;renderBC();if(searchQ.trim())renderSearch(searchQ.trim().toLowerCase());else render();}
function goHome(){view='home';curCat=null;curId=null;searchQ='';document.getElementById('sq').value='';closeAllOvr();render();}
function goCat(cat){view='category';curCat=cat;curId=null;searchQ='';document.getElementById('sq').value='';closeAllOvr();render();}
function goRecipe(id){view='recipe';curId=id;searchQ='';document.getElementById('sq').value='';closeAllOvr();render();}
function openAdd(){
  resetAddForm();
  ['fT','fTm','fA','fSv','fI','fSt','fN'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  if(curCat)document.getElementById('fC').value=curCat;
  document.getElementById('addOvr').classList.add('open');
}
function cOvr(id){document.getElementById(id).classList.remove('open');}
function closeAllOvr(){document.querySelectorAll('.ovr').forEach(o=>o.classList.remove('open'));}
document.querySelectorAll('.ovr').forEach(o=>{o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  if(USERS[u]&&USERS[u]===p){
    loggedIn=true;curUser=u;cOvr('loginOvr');
    document.getElementById('lu').value='';document.getElementById('lp').value='';err.textContent='';render();
  } else {err.textContent='שם משתמש או סיסמא שגויים';}
}
function logout(){loggedIn=false;curUser='';render();}

function pvH(inp){
  if(!inp.files[0])return;
  const rd=new FileReader();
  rd.onload=e=>{heroB64=e.target.result;document.getElementById('hp').innerHTML=`<img src="${heroB64}" style="width:100%;height:130px;object-fit:cover;border-radius:8px;border:1px solid var(--bdr);margin-top:.35rem">`;};
  rd.readAsDataURL(inp.files[0]);
}
function pvE(inp){
  extraB64=[];document.getElementById('ep').innerHTML='';
  Array.from(inp.files).forEach(f=>{const rd=new FileReader();rd.onload=e=>{extraB64.push(e.target.result);document.getElementById('ep').innerHTML+=`<img src="${e.target.result}" alt="">`;};rd.readAsDataURL(f);});
}

function saveR(){
  const title=document.getElementById('fT').value.trim();
  if(!title){alert('יש להזין שם מתכון');return;}
  const r={id:nextId++,title,cat:document.getElementById('fC').value,author:document.getElementById('fA').value||curUser,time:document.getElementById('fTm').value||'לא צוין',emoji:'🍽️',servings:document.getElementById('fSv').value||'4 מנות',heroImg:heroB64,extraImgs:[...extraB64],ing:document.getElementById('fI').value.split('\n').filter(x=>x.trim()),steps:document.getElementById('fSt').value.trim(),notes:document.getElementById('fN').value.trim()};
  recipes.unshift(r);saveRecipes(recipes);
  ['fT','fTm','fA','fSv','fI','fSt','fN'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('hp').innerHTML='';document.getElementById('ep').innerHTML='';
  heroB64=null;extraB64=[];cOvr('addOvr');curCat=r.cat;view='category';render();
}

function deleteR(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  if(!confirm('למחוק את "'+r.title+'"?'))return;
  recipes=recipes.filter(x=>x.id!==id);
  saveRecipes(recipes);
  goCat(r.cat);
}

function exportData(){
  const data=JSON.stringify(recipes,null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='מתכונים_פורטוגה.json';
  a.click();
}

function importData(inp){
  if(!inp.files[0])return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!Array.isArray(imported)){alert('קובץ לא תקין');return;}
      if(!confirm('ייבוא '+imported.length+' מתכונים? (יוחלפו המתכונים הנוכחיים)'))return;
      recipes=imported;
      nextId=Math.max(...recipes.map(r=>r.id),9)+1;
      saveRecipes(recipes);
      render();
      alert('יובאו '+imported.length+' מתכונים בהצלחה!');
    }catch(err){alert('שגיאה בקריאת הקובץ');}
  };
  rd.readAsText(inp.files[0]);
  inp.value='';
}

function openEdit(id){
  try{
  const r=recipes.find(x=>x.id===id);
  if(!r){alert('מתכון לא נמצא: '+id);return;}
  document.getElementById('fC').value=r.cat;
  document.getElementById('fA').value=r.author||'';
  document.getElementById('fTm').value=r.time||'';
  document.getElementById('fSv').value=r.servings||'';
  document.getElementById('fI').value=r.ing.join('\n');
  document.getElementById('fSt').value=r.steps||'';
  document.getElementById('fN').value=r.notes||'';
  document.getElementById('fT').value=r.title||'';
  heroB64=r.heroImg||null;
  extraB64=[...(r.extraImgs||[])];
  document.querySelector('.mhtit').textContent='עריכת מתכון';
  const eBtn=document.getElementById('eSaveBtn');
  const sBtn=document.getElementById('saveBtn');
  if(eBtn)eBtn.style.display='';
  if(sBtn)sBtn.style.display='none';
  document.getElementById('editId').value=id;
  document.getElementById('addOvr').classList.add('open');
  }catch(e){alert('שגיאה: '+e.message);}
}

function saveEdit(){
  const id=parseInt(document.getElementById('editId').value);
  const idx=recipes.findIndex(x=>x.id===id);
  if(idx===-1)return;
  const title=document.getElementById('fT').value.trim();
  if(!title){alert('יש להזין שם מתכון');return;}
  recipes[idx]={...recipes[idx],
    title,
    cat:document.getElementById('fC').value,
    author:document.getElementById('fA').value||curUser,
    time:document.getElementById('fTm').value||'לא צוין',
    servings:document.getElementById('fSv').value||'4 מנות',
    heroImg:heroB64||recipes[idx].heroImg,
    extraImgs:extraB64.length?[...extraB64]:recipes[idx].extraImgs,
    ing:document.getElementById('fI').value.split('\n').filter(x=>x.trim()),
    steps:document.getElementById('fSt').value.trim(),
    notes:document.getElementById('fN').value.trim()
  };
  saveRecipes(recipes);
  heroB64=null;extraB64=[];
  document.getElementById('editId').value='';
  document.querySelector('.mhtit').textContent='מתכון חדש';
  document.getElementById('eSaveBtn').style.display='none';
  document.getElementById('saveBtn').style.display='';
  cOvr('addOvr');
  view='recipe';curId=id;render();
}

function resetAddForm(){
  document.querySelector('.mhtit').textContent='מתכון חדש';
  const eBtn=document.getElementById('eSaveBtn');
  const sBtn=document.getElementById('saveBtn');
  if(eBtn)eBtn.style.display='none';
  if(sBtn)sBtn.style.display='';
  document.getElementById('editId').value='';
  ['fT','fTm','fA','fSv','fI','fSt','fN'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  heroB64=null;extraB64=[];
}

function printR(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  const w=window.open('','_blank');
  w.document.write(`<html dir="rtl"><head><title>${r.title}</title><style>body{font-family:serif;padding:2rem;max-width:640px;margin:auto}h1{font-size:2rem;margin-bottom:.3rem}h3{color:#7B4F2E;margin:1.2rem 0 .4rem}li{margin:.32rem 0;line-height:1.6}p{color:#888;margin-bottom:.8rem}.inst{line-height:1.9;white-space:pre-wrap}.notes{background:#FDF5E8;padding:.8rem;border-radius:8px;font-size:.92rem;line-height:1.7;white-space:pre-wrap}img{max-width:100%;border-radius:8px;margin:.4rem 0}</style></head><body>${r.heroImg?`<img src="${r.heroImg}" style="width:100%;height:200px;object-fit:cover">`:''}<h1>${r.title}</h1><p>מאת ${r.author} | ${r.time} | ${r.servings}</p><h3>מצרכים</h3><ul>${r.ing.map(i=>'<li>'+i+'</li>').join('')}</ul><h3>הוראות הכנה</h3><div class="inst">${r.steps}</div>${r.notes?`<h3>הערות</h3><div class="notes">${r.notes}</div>`:''}${r.extraImgs&&r.extraImgs.length?`<h3>תמונות</h3>${r.extraImgs.map(s=>`<img src="${s}">`).join('')}`:''}
  </body></html>`);w.document.close();w.print();
}

render();
</script>
</body>
</html>
